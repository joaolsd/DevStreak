name: DevStreak
options:
  bundleIdPrefix: org.bondis
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES
targets:
  DevStreak:
    type: application
    platform: iOS
    sources:
      - path: DevStreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.bondis.devstreak
        CODE_SIGN_ENTITLEMENTS: DevStreak/DevStreak.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - target: DevStreakWidget

  DevStreakWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DevStreakWidget
      - path: DevStreak/Models/AppConstants.swift
      - path: DevStreak/Models/DateHelpers.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.bondis.devstreak.DevStreakWidget
        CODE_SIGN_ENTITLEMENTS: DevStreakWidget/DevStreakWidget.entitlements
        SKIP_INSTALL: YES
    info:
      path: DevStreakWidget/Info.plist
      properties:
        CFBundleDisplayName: DevStreakWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
